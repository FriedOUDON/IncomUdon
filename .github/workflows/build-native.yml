name: Native Multi-Platform Build

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

env:
  QT_VERSION: "6.10.2"
  QT_MODULES: "qtmultimedia"
  CMAKE_BUILD_TYPE: "Release"
  CMAKE_COMMON_ARGS: >-
    -DINCOMUDON_CODEC2_RUNTIME_LOADER=ON
    -DUSE_CODEC2_ANDROID_PREBUILT=OFF
    -DUSE_CODEC2_WINDOWS_PREBUILT=OFF
    -DUSE_OPENSSL_ANDROID_PREBUILT=ON
    -DUSE_OPENSSL_WINDOWS_PREBUILT=ON
    -DUSE_OPUS_ANDROID_PREBUILT=ON
    -DUSE_OPUS_WINDOWS_PREBUILT=ON

jobs:
  desktop:
    name: Desktop (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            qt_arch: win64_msvc2022_64
            artifact: dist/windows/**
          - name: macos
            os: macos-latest
            qt_arch: clang_64
            artifact: build/appIncomUdon.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: desktop
          arch: ${{ matrix.qt_arch }}
          modules: ${{ env.QT_MODULES }}
          cache: true

      - name: Configure
        run: qt-cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} ${{ env.CMAKE_COMMON_ARGS }} -DUSE_OPUS_WINDOWS_PREBUILT=ON

      - name: Build
        run: cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }} --parallel

      - name: Deploy Runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $deployDir = Join-Path $PWD "dist/windows"
          New-Item -ItemType Directory -Path $deployDir -Force | Out-Null

          $exe = Join-Path $PWD "build/appIncomUdon.exe"
          if (-not (Test-Path $exe)) {
            throw "Executable not found: $exe"
          }
          Copy-Item $exe (Join-Path $deployDir "appIncomUdon.exe") -Force

          windeployqt.exe --release --qmldir "$PWD/ui" --compiler-runtime (Join-Path $deployDir "appIncomUdon.exe")

          # Custom codec/runtime DLLs are not always discovered by windeployqt.
          $customDllCandidates = @(
            (Join-Path $PWD "build/libopus.dll"),
            (Join-Path $PWD "build/opus.dll"),
            (Join-Path $PWD "third_party/libopus_windows/mingw64/lib/libopus.dll"),
            (Join-Path $PWD "third_party/libopus_windows/x64/lib/libopus.dll"),
            (Join-Path $PWD "third_party/libopus_windows/win64/lib/libopus.dll")
          )
          foreach ($cand in $customDllCandidates) {
            if (Test-Path $cand) {
              Copy-Item $cand $deployDir -Force
              Write-Host "Copied custom runtime DLL: $cand"
            }
          }

          # OpenSSL DLLs are not always deployed by windeployqt.
          $opensslDlls = @("libcrypto-3-x64.dll", "libssl-3-x64.dll")
          $pathDirs = $env:PATH -split ';'
          foreach ($dll in $opensslDlls) {
            $found = $null
            foreach ($d in $pathDirs) {
              if ([string]::IsNullOrWhiteSpace($d)) { continue }
              $cand = Join-Path $d $dll
              if (Test-Path $cand) {
                $found = $cand
                break
              }
            }
            if ($found) {
              Copy-Item $found $deployDir -Force
              Write-Host "Copied $dll from $found"
            } else {
              Write-Warning "$dll not found in PATH"
            }
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: incomudon-${{ matrix.name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  ios:
    name: iOS (Simulator)
    runs-on: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ninja
        run: brew install ninja

      - name: Install Qt (iOS)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: ios
          arch: ios
          modules: ${{ env.QT_MODULES }}
          cache: true

      - name: Configure
        run: |
          qt-cmake -S . -B build-ios -G Xcode \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=NO \
            ${{ env.CMAKE_COMMON_ARGS }}

      - name: Build
        run: cmake --build build-ios --config ${{ env.CMAKE_BUILD_TYPE }} --target appIncomUdon --parallel --verbose

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: incomudon-ios-simulator
          path: build-ios/**/*.app
          if-no-files-found: error

  ios-device:
    name: iOS (Device, Signed IPA)
    runs-on: macos-14
    env:
      IOS_CERT_P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
      IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
      IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
      IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
      IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
      IOS_EXPORT_METHOD: ${{ secrets.IOS_EXPORT_METHOD }}
      IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check iOS Signing Secrets
        id: ios_signing_guard
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for key in IOS_CERT_P12_BASE64 IOS_CERT_PASSWORD IOS_PROVISION_PROFILE_BASE64 IOS_TEAM_ID IOS_BUNDLE_ID; do
            if [ -z "${!key:-}" ]; then
              echo "missing: $key"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "iOS device signing secrets are missing; skipping signed IPA build."
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Ninja
        if: steps.ios_signing_guard.outputs.should_build == 'true'
        run: brew install ninja

      - name: Install Qt (iOS)
        if: steps.ios_signing_guard.outputs.should_build == 'true'
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: ios
          arch: ios
          modules: ${{ env.QT_MODULES }}
          cache: true

      - name: Install Signing Certificate and Provisioning Profile
        if: steps.ios_signing_guard.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euxo pipefail

          KEYCHAIN_NAME="build.keychain-db"
          KEYCHAIN_PASS="${IOS_KEYCHAIN_PASSWORD:-temp_keychain_password}"
          CERT_PATH="$RUNNER_TEMP/ios_cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"

          echo "$IOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_NAME"
          security import "$CERT_PATH" -k "$KEYCHAIN_NAME" -P "$IOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_NAME"
          security list-keychains -d user -s "$KEYCHAIN_NAME" login.keychain-db
          security default-keychain -d user -s "$KEYCHAIN_NAME"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$PROFILE_PLIST")
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Configure
        if: steps.ios_signing_guard.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euxo pipefail
          qt-cmake -S . -B build-ios-device -G Xcode \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_XCODE_ATTRIBUTE_DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            -DCMAKE_XCODE_ATTRIBUTE_PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_ID" \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_STYLE=Manual \
            -DCMAKE_XCODE_ATTRIBUTE_PROVISIONING_PROFILE="$PROFILE_UUID" \
            -DCMAKE_XCODE_ATTRIBUTE_PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            ${{ env.CMAKE_COMMON_ARGS }}

      - name: Archive App
        if: steps.ios_signing_guard.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euxo pipefail
          xcodebuild \
            -project build-ios-device/IncomUdon.xcodeproj \
            -scheme appIncomUdon \
            -configuration "${{ env.CMAKE_BUILD_TYPE }}" \
            -destination generic/platform=iOS \
            -archivePath "$PWD/build-ios-device/appIncomUdon.xcarchive" \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            archive

      - name: Export IPA
        if: steps.ios_signing_guard.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euxo pipefail
          EXPORT_METHOD="${IOS_EXPORT_METHOD:-ad-hoc}"
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${EXPORT_METHOD}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

          mkdir -p dist/ios-device
          xcodebuild -exportArchive \
            -archivePath "$PWD/build-ios-device/appIncomUdon.xcarchive" \
            -exportPath "$PWD/dist/ios-device" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload Artifact
        if: steps.ios_signing_guard.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: incomudon-ios-device
          path: |
            dist/ios-device/*.ipa
            build-ios-device/appIncomUdon.xcarchive
          if-no-files-found: error

  android:
    name: Android (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            qt_arch: android_arm64_v8a
            artifact_name: incomudon-android-arm64-v8a
            apk_suffix: arm64-v8a
          - abi: armeabi-v7a
            qt_arch: android_armv7
            artifact_name: incomudon-android-armeabi-v7a
            apk_suffix: armeabi-v7a
    permissions:
      contents: write
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Components
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;27.2.12479018"

      - name: Set Android NDK env
        run: |
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/27.2.12479018" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Check Android Signing Secrets
        shell: bash
        run: |
          set -euo pipefail
          for key in ANDROID_KEYSTORE_BASE64 ANDROID_KEY_ALIAS ANDROID_KEYSTORE_PASSWORD; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: $key" >&2
              exit 1
            fi
          done

      - name: Setup Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install Qt (Android)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: android
          arch: ${{ matrix.qt_arch }}
          modules: ${{ env.QT_MODULES }}
          cache: true

      - name: Fix Qt Tool Permissions (Android)
        shell: bash
        run: |
          set -euo pipefail
          QT_BIN_DIR="$RUNNER_WORKSPACE/Qt/${QT_VERSION}/${{ matrix.qt_arch }}/bin"
          if [ ! -d "$QT_BIN_DIR" ]; then
            echo "Qt bin directory not found: $QT_BIN_DIR" >&2
            exit 1
          fi
          chmod +x "$QT_BIN_DIR/qt-cmake" || true
          chmod +x "$QT_BIN_DIR/qmake" || true
          chmod +x "$QT_BIN_DIR/androiddeployqt" || true

      - name: Configure
        run: |
          qt-cmake -S . -B build-android -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-23 \
            -DUSE_OPENSSL_ANDROID_PREBUILT=ON \
            -DUSE_OPUS_ANDROID_PREBUILT=ON \
            ${{ env.CMAKE_COMMON_ARGS }}

      - name: Build
        run: cmake --build build-android --config ${{ env.CMAKE_BUILD_TYPE }} --target appIncomUdon --parallel

      - name: Build APK (Release)
        run: cmake --build build-android --config ${{ env.CMAKE_BUILD_TYPE }} --target apk --parallel

      - name: Sign APK (Release)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/android

          UNSIGNED_APK="$(find build-android -type f -name '*release-unsigned.apk' | head -n 1)"
          if [ -z "$UNSIGNED_APK" ]; then
            echo "Release unsigned APK not found under build-android" >&2
            find build-android -type f -name '*.apk' -print || true
            exit 1
          fi

          KEYSTORE_PATH="$RUNNER_TEMP/release.keystore"
          ALIGNED_APK="$RUNNER_TEMP/appIncomUdon-release-aligned.apk"
          SIGNED_APK="$PWD/dist/android/appIncomUdon-release-signed-${{ matrix.apk_suffix }}.apk"

          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"

          ZIPALIGN="$ANDROID_SDK_ROOT/build-tools/34.0.0/zipalign"
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner"
          if [ ! -x "$ZIPALIGN" ] || [ ! -x "$APKSIGNER" ]; then
            echo "zipalign/apksigner not found in build-tools/34.0.0" >&2
            exit 1
          fi

          "$ZIPALIGN" -f -p 4 "$UNSIGNED_APK" "$ALIGNED_APK"

          KEY_PASS="${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
          "$APKSIGNER" sign \
            --ks "$KEYSTORE_PATH" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
            --key-pass "pass:$KEY_PASS" \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"

          "$APKSIGNER" verify --verbose "$SIGNED_APK"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/android/*.apk
            build-android/**/*.so
          if-no-files-found: error

      - name: Publish Signed APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/android/appIncomUdon-release-signed-${{ matrix.apk_suffix }}.apk
